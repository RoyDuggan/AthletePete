# Virtual Pete — host-agnostic production stack.
#
#   web (Caddy)  →  serves the built frontend + proxies /api → backend
#   backend      →  Node/Express + Prisma
#   postgres     →  database (named volume)
#
# Quick start:
#   cp .env.example .env   # then fill in secrets
#   docker compose up --build
#   open http://localhost:8080
#
# Production: set SITE_ADDRESS=your-domain.com and HTTP_PORT=80 HTTPS_PORT=443
# in .env for automatic HTTPS.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpete}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vpete}
      POSTGRES_DB: ${POSTGRES_DB:-virtualpete}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpete} -d ${POSTGRES_DB:-virtualpete}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-vpete}:${POSTGRES_PASSWORD:-vpete}@postgres:5432/${POSTGRES_DB:-virtualpete}?schema=public
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_DRIVER: ${STRIPE_PRICE_DRIVER:-}
      STRIPE_PRICE_TEAM: ${STRIPE_PRICE_TEAM:-}
      STRIPE_PRICE_COACH: ${STRIPE_PRICE_COACH:-}
      POSTMARK_SERVER_TOKEN: ${POSTMARK_SERVER_TOKEN:-}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@virtualpete.co.uk}
      APP_URL: ${APP_URL:-}
    volumes:
      - telemetry:/app/uploads
      - appdata:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    depends_on:
      - backend
    restart: unless-stopped

  # Nightly backups: pg_dump + the appdata/telemetry volumes → ./backups.
  # Schedule (BACKUP_CRON) and retention (BACKUP_KEEP_DAYS) are configurable.
  backup:
    image: postgres:16-alpine
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-vpete}
      PGPASSWORD: ${POSTGRES_PASSWORD:-vpete}
      PGDATABASE: ${POSTGRES_DB:-virtualpete}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
    volumes:
      - telemetry:/data/uploads:ro
      - appdata:/data/appdata:ro
      - ./backups:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint:
      - /bin/sh
      - -c
      - 'echo "$$BACKUP_CRON sh /usr/local/bin/backup.sh >> /backups/backup.log 2>&1" > /etc/crontabs/root && crond -f -l 8'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  telemetry:
  appdata:
